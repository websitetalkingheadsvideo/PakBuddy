# /etc/apache2/sites-available/pakbuddystore.com.conf
#
# Apache 2.4 virtual host for pakbuddystore.com.
# Assumes mod_proxy, mod_proxy_http, mod_rewrite, mod_headers, mod_ssl,
# and mod_deflate are enabled:
#     a2enmod proxy proxy_http rewrite headers ssl deflate expires
#
# Requires the React build output at /var/www/pakbuddystore.com/frontend/build
# and the uvicorn backend listening on 127.0.0.1:8001.

<VirtualHost *:80>
    ServerName pakbuddystore.com
    ServerAlias www.pakbuddystore.com

    # Force HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName pakbuddystore.com
    ServerAlias www.pakbuddystore.com

    DocumentRoot /var/www/pakbuddystore.com/frontend/build

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/pakbuddystore.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/pakbuddystore.com/privkey.pem

    # Redirect www → apex
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\. [NC]
    RewriteRule ^ https://pakbuddystore.com%{REQUEST_URI} [R=301,L]

    # ---- Proxy /api/ to the FastAPI backend ----
    ProxyPreserveHost On
    ProxyPass        /api/  http://127.0.0.1:8001/api/
    ProxyPassReverse /api/  http://127.0.0.1:8001/api/

    # Pass real client IP to the backend (used for rate limiting / logs)
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"

    # ---- Static frontend ----
    <Directory /var/www/pakbuddystore.com/frontend/build>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA fallback: only for the React landing page.
        # Static files (CSS/JS/images/blog HTML) are served directly.
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteCond %{REQUEST_URI} !^/blog/
        RewriteRule ^ index.html [L]
    </Directory>

    # ---- Blog: trailing-slash directories serve their index.html ----
    DirectoryIndex index.html

    # ---- Caching ----
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/png   "access plus 30 days"
        ExpiresByType image/jpeg  "access plus 30 days"
        ExpiresByType image/webp  "access plus 30 days"
        ExpiresByType image/svg+xml "access plus 30 days"
        ExpiresByType video/webm  "access plus 30 days"
        ExpiresByType text/css    "access plus 7 days"
        ExpiresByType application/javascript "access plus 7 days"
        ExpiresByType text/html   "access plus 5 minutes"
    </IfModule>

    # ---- Compression ----
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE application/xml text/xml image/svg+xml
    </IfModule>

    # ---- Security headers (defense-in-depth) ----
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options    "nosniff"
    Header always set X-Frame-Options           "DENY"
    Header always set Referrer-Policy           "strict-origin-when-cross-origin"
    Header always set Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()"
    Header unset      Server
    Header always unset X-Powered-By

    ErrorLog  ${APACHE_LOG_DIR}/pakbuddystore.error.log
    CustomLog ${APACHE_LOG_DIR}/pakbuddystore.access.log combined
</VirtualHost>
